default:
  image: google/cloud-sdk:alpine
  before_script:
    - gcloud auth activate-service-account --key-file "$SERVICE_ACCOUNT"
    - gcloud config set project ptbudimas

build:
  stage: build
  script:
    - gcloud builds submit --config=cloudbuild.yaml --substitutions=_LOCATION="asia-southeast2",_REPOSITORY="budimas-fe-stock-opname",_IMAGE="budimas-fe-stock-opname"

deploy:
  stage: deploy
  script:
    - gcloud run deploy budimas-stock-opname --image asia-southeast2-docker.pkg.dev/ptbudimas/budimas-fe-stock-opname/budimas-fe-stock-opname --region=asia-southeast2 --platform managed --allow-unauthenticated