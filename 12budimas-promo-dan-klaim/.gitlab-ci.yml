default:
  image: google/cloud-sdk:alpine
  before_script:
    - gcloud auth activate-service-account --key-file "$SERVICE_ACCOUNT"
    - gcloud config set project ptbudimas

build:
  stage: build
  script:
    - gcloud builds submit --config=cloudbuild.yaml --substitutions=_LOCATION="asia-southeast2",_REPOSITORY="fe-klaim",_IMAGE="fe-klaim"

deploy:
  stage: deploy
  script:
    - gcloud run deploy budimas-klaim --image asia-southeast2-docker.pkg.dev/ptbudimas/fe-klaim/fe-klaim --region=asia-southeast2 --platform managed --allow-unauthenticated
